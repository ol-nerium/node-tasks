type: object
required:
    - _id
    - name
    - phoneNumber
    - email
    - isFavourite
    - contactType
    - user
properties:
    - _id:
          description: "Contact's id"
          type: string
          example: 65e4decdd286b30065d54af9
    - name:
          description: "Contact's name"
          type: string
          example: 'John Bobraman'
    - phoneNumber:
          description: "Contact's phone number"
          type: string
          example: '0123456789'
    - email:
          description: "Contact's email"
          type: string
          example: 'johnsins@mail.com'
    - isFavourite:
          description: "Contact's preference by user"
          type: boolean
          example: false
    - contactType:
          description: "Contact's type. Should be one of 'work', 'home', 'personal'"
          type: string
          example: 'home'
    - user:
          description: "Contact's user id"
          type: string
          example: 62e4decdd186b30065d56af1
    - photo:
          description: "Contact's photo link"
          type: string
          example: https://res.cloudinary.com/uqwgdu/image/upload/image.png
